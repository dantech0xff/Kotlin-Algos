<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer — Kotlin/Wasm</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            color: #eee;
        }
        #root { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 10;
            background: #1a1a2e;
        }
        #loader h2 { color: #f8f8f2; margin: 0 0 12px 0; font-size: 20px; }
        #loader p { color: #8888a8; margin: 0 0 20px 0; font-size: 13px; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #33334a;
            border-top: 3px solid #7c7cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #progress-bar {
            width: 200px; height: 3px;
            background: #33334a; border-radius: 2px;
            margin-top: 16px; overflow: hidden;
        }
        #progress-fill {
            height: 100%; width: 0%;
            background: #7c7cf8; border-radius: 2px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="loader">
        <h2>Algorithm Visualizer</h2>
        <p>Loading Kotlin/Wasm runtime...</p>
        <div class="spinner"></div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <canvas id="root"></canvas>
    <script>
        // Show download progress for the main JS bundle
        const fill = document.getElementById('progress-fill');
        const loader = document.getElementById('loader');

        if (window.fetch) {
            fetch('algo-viz.js')
                .then(r => {
                    const total = parseInt(r.headers.get('content-length') || '0');
                    if (!total || !r.body) return r.text();
                    let loaded = 0;
                    const reader = r.body.getReader();
                    return new Response(
                        new ReadableStream({
                            start(ctrl) {
                                function pump() {
                                    reader.read().then(({done, value}) => {
                                        if (done) { ctrl.close(); return; }
                                        loaded += value.length;
                                        fill.style.width = Math.min(90, (loaded / total) * 90) + '%';
                                        ctrl.enqueue(value);
                                        pump();
                                    });
                                }
                                pump();
                            }
                        })
                    ).text();
                })
                .then(() => {
                    fill.style.width = '100%';
                    setTimeout(() => { loader.style.display = 'none'; }, 2000);
                });
        }
    </script>
    <script src="algo-viz.js"></script>
</body>
</html>
